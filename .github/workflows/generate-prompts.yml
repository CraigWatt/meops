name: Generate prompts (All time)

on:
  workflow_dispatch:
    inputs:
      repository_scope:
        description: Repository scope for the prompt
        required: false
        type: string
        default: all watched repositories

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MEOPS_PROMPT_TIME_RANGE: all
  MEOPS_PROMPT_REPOSITORIES: ${{ inputs.repository_scope }}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate prompts
        run: node --experimental-strip-types .github/scripts/generate-prompts.ts
