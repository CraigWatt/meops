name: GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Refresh visibility snapshot
        if: github.event_name != 'pull_request'
        run: |
          pnpm --filter @meops/worker build
          node services/worker/dist/index.js
        env:
          MEOPS_GITHUB_TOKEN: ${{ secrets.MEOPS_GITHUB_TOKEN }}

      - name: Build web export
        run: pnpm --filter @meops/web build
        env:
          GITHUB_PAGES: "true"

      - name: Add Pages marker
        if: github.event_name != 'pull_request'
        run: touch services/web/out/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: services/web/out

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
