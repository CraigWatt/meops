name: Publish X Draft

on:
  workflow_dispatch:
    inputs:
      draft_title:
        description: "Label for the draft"
        required: true
        default: "meops snapshot"
      draft_body:
        description: "Paste the edited X draft body here"
        required: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: publish-x-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Restrict publish to repository owner
        run: |
          if [ "${{ github.actor }}" != "${{ github.repository_owner }}" ]; then
            echo "Only the repository owner can publish X drafts."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish X draft
        run: node .github/scripts/publish-x.mjs
        env:
          X_DRAFT_TITLE: ${{ inputs.draft_title }}
          X_DRAFT_BODY: ${{ inputs.draft_body }}
          MEOPS_X_CONSUMER_KEY: ${{ secrets.MEOPS_X_CONSUMER_KEY }}
          MEOPS_X_CONSUMER_SECRET: ${{ secrets.MEOPS_X_CONSUMER_SECRET }}
          MEOPS_X_ACCESS_TOKEN: ${{ secrets.MEOPS_X_ACCESS_TOKEN }}
          MEOPS_X_ACCESS_TOKEN_SECRET: ${{ secrets.MEOPS_X_ACCESS_TOKEN_SECRET }}
          MEOPS_X_API_BASE: ${{ secrets.MEOPS_X_API_BASE }}
